<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
</head>
<body>

<h2>To-Do Form</h2>

<!-- For Master 1 Barch Change -->

<form id="todoForm">
    <input type="text" placeholder="Item ID"><br><br>
    <input type="text" id="itemName" placeholder="Item Name"><br><br>
    <input type="text" id="itemDescription" placeholder="Item Description"><br><br>
    <button type="submit">Submit</button>
</form>

<script>
document.getElementById("todoForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("/submittodoitem", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            itemName: document.getElementById("itemName").value,
            itemDescription: document.getElementById("itemDescription").value
        })
    })
    .then(res => res.json())
    .then(data => alert(data.message));
});
</script>

</body>
</html>
