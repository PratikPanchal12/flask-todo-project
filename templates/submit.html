<!DOCTYPE html>
<html>
<head>
    <title>Submit Data</title>
</head>
<body>
    <h1>Submit Data</h1>
    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}
    <!-- This form submits data to the server. The server will validate the input and respond accordingly. -->
    <form method="post">
        Name: <input type="text" name="name"><br>
        Email: <input type="email" name="email"><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
